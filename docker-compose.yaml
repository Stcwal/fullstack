services:
  db:
    build:
      context: .
      dockerfile: db/Dockerfile
    env_file:
      - .env
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ik_kontroll}
      MYSQL_USER: ${MYSQL_USER:-ik_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-ik_pass}
    ports:
      - '3306:3306'
    volumes:
      - db_data_mysql80:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: "jdbc:mysql://db:3306/${MYSQL_DATABASE:-ik_kontroll}?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC&characterEncoding=UTF-8&useUnicode=true"
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-ik_user}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-ik_pass}
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
    depends_on:
      db:
        condition: service_healthy
    ports:
      - '8080:8080'
  frontend:
    image: node:20-alpine
    working_dir: /app
    depends_on:
      - backend
    environment:
      VITE_API_PROXY_TARGET: http://backend:8080
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - '5173:5173'
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
volumes:
  db_data_mysql80:
  frontend_node_modules:
