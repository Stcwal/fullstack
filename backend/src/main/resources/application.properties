

# Where the JSON spec lives
springdoc.api-docs.path=/v3/api-docs

# Where the UI lives ? http://localhost:8080/swagger-ui.html
springdoc.swagger-ui.path=/swagger-ui.html

# Expand all operations by default (optional, nice for graders)
springdoc.swagger-ui.defaultModelsExpandDepth=2
springdoc.swagger-ui.defaultOperationsExpandDepth=1

# Sort endpoints alphabetically
springdoc.swagger-ui.operationsSorter=alpha
springdoc.swagger-ui.tagsSorter=alpha

# Disable the default petstore example
springdoc.swagger-ui.disable-swagger-default-url=true

# JWT settings
app.jwt.secret=${JWT_SECRET:change-this-to-a-long-random-secret-at-least-32-characters}
app.jwt.expiration-ms=28800000
app.jwt.cookie-name=jwt
app.jwt.cookie-secure=true

# Invite onboarding settings
app.invite.frontend-base-url=${FRONTEND_BASE_URL:http://localhost:5173}
app.invite.from-address=${MAIL_USERNAME:no-reply@iksystem.local}

# Mail configuration — credentials supplied via MAIL_USERNAME / MAIL_PASSWORD env vars.
# Leave both blank to disable email (invites won't send, everything else works).
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Flyway migrations
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Dev-only seed data lives in classpath:db/migration-dev
# and is enabled via application-dev.properties.